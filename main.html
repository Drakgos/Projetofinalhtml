<html>
<head>
    <title>PLaneador de Receitas</title>
    </head>
<body>
    <h1>PLaneador de Receitas</h1>
    <p>Bem-vindo ao PLaneador de Receitas! Aqui você pode criar e organizar suas receitas favoritas.</p>
    <h2>Adicionar Receita</h2>
    <form>
        <label for="nome">Nome da Receita:</label><br>
        <input type="text" id="nome" name="nome"><br><br>
        <label for="ingredientes">Ingredientes:</label><br>
        <textarea id="ingredientes" name="ingredientes"></textarea><br><br>
        <label for="instrucoes">Instruções:</label><br>
        <textarea id="instrucoes" name="instrucoes"></textarea><br><br>
        <input type="submit" value="Adicionar Receita">
    </form>
</html>
